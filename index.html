<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>乖宝和溪溪 | 樱花流体玻璃</title>
  <style>
    :root {
      --bg-color: #fff5f7;
      --glass-bg: rgba(255, 255, 255, 0.6);
      --glass-border: rgba(255, 182, 193, 0.4);
      --text-main: #2d3436;
      --text-sub: #636e72;
      --accent: #ff9a9e;
      --glow-1: rgba(255, 154, 158, 0.4);
      --glow-2: rgba(254, 207, 239, 0.4);
      --shadow: 0 20px 50px rgba(255, 154, 158, 0.1);
      --shadow-hover: 0 30px 60px rgba(255, 154, 158, 0.2);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--bg-color); color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      min-height: 100vh; overflow-x: hidden;
      display: flex; flex-direction: column; align-items: center;
      perspective: 1200px;
      animation: liquidShadow 4s infinite ease-in-out;
    }
    @keyframes liquidShadow {
      0% { text-shadow: 0 0 8px rgba(255,255,255,0.4), 0 2px 8px var(--accent); }
      50% { text-shadow: 0 4px 16px rgba(255,255,255,0.6), 0 6px 16px var(--accent); }
      100% { text-shadow: 0 0 8px rgba(255,255,255,0.4), 0 2px 8px var(--accent); }
    }
    .bg-glow {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
      width: 140vw; height: 140vh; z-index: 0; pointer-events: none;
      background: radial-gradient(circle at 30% 40%, var(--glow-1) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, var(--glow-2) 0%, transparent 50%);
      filter: blur(100px); animation: breathe 12s infinite alternate ease-in-out;
    }
    @keyframes breathe {
      0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); opacity: 0.8; }
      100% { transform: translate(-50%, -50%) scale(1.3) rotate(15deg); opacity: 1; }
    }
    .glass-card {
      position: relative; z-index: 10; background: var(--glass-bg);
      border: 1px solid var(--glass-border); border-radius: 28px;
      backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
      box-shadow: var(--shadow); transition: transform 0.1s ease-out, box-shadow 0.3s ease, opacity 0.5s ease;
      overflow: hidden;
    }
    .glass-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 28px;
      background: radial-gradient(circle at var(--mouse-x, 50%) var(--mouse-y, 50%), rgba(255,255,255,0.8) 0%, transparent 50%);
      opacity: 0; transition: opacity 0.3s ease; pointer-events: none; z-index: 2;
    }
    .glass-card:hover::before { opacity: 1; }
    .glass-card:hover { box-shadow: var(--shadow-hover); }
    .top-nav {
      position: fixed; top: 0; left: 0; width: 100%; padding: 20px 30px;
      display: flex; justify-content: space-between; align-items: center; z-index: 100;
      background: rgba(255,245,247,0.5); backdrop-filter: blur(10px);
    }
    .nav-btns { display: flex; gap: 15px; }
    .nav-btn {
      padding: 12px 28px; border-radius: 50px; font-size: 1rem; font-weight: 600;
      cursor: pointer; border: 1px solid var(--glass-border); background: var(--glass-bg);
      color: var(--text-main); transition: all 0.3s ease;
    }
    .nav-btn:hover { background: var(--accent); color: #fff; transform: translateY(-2px); }
    .hero-card {
      width: 90%; max-width: 1000px; min-height: 85vh;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      margin-top: 80px; padding: 40px; position: relative;
    }
    .hero-card h1 {
      font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; line-height: 1.2;
      background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; z-index: 2;
    }
    /* 修复后的封面框 */
    .cover-frame {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 24px;
      background: rgba(255,255,255,0.3);
      border: 2px dashed rgba(255, 182, 193, 0.5);
      overflow: hidden;
      position: relative;
      transition: all 0.5s ease;
      max-width: 100%;
      max-height: 60vh;
    }
    .cover-frame.has-img {
      border: none;
      background: transparent;
    }
    .cover-frame img {
      object-fit: contain;
      max-width: 100%;
      max-height: 60vh;
      height: auto;
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }
    .cover-frame.has-img img { opacity: 1; }
    .cover-placeholder {
      color: var(--text-sub);
      font-size: 1.2rem;
      opacity: 0.6;
      padding: 40px;
    }
    .floating-decos {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; overflow: hidden; z-index: 1;
    }
    .deco {
      position: absolute; opacity: 0.6; fill: var(--accent);
      animation: floatUp linear infinite;
    }
    @keyframes floatUp {
      0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 0; }
      10% { opacity: 0.6; } 90% { opacity: 0.6; }
      100% { transform: translateY(-80vh) rotate(360deg) scale(1.2); opacity: 0; }
    }
    /* 日记页 */
    #diary-page {
      display: none; width: 100%; max-width: 1000px;
      padding: 100px 20px 60px; opacity: 0; transition: opacity 0.6s ease;
    }
    .diary-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
      gap: 25px; margin-top: 20px;
    }
    .diary-card {
      padding: 30px 25px; text-align: left; cursor: pointer;
    }
    .diary-card .date { font-size: 0.8rem; color: var(--text-sub); margin-bottom: 12px; }
    .diary-card h3 { font-size: 1.2rem; margin-bottom: 10px; }
    .diary-card p { font-size: 0.95rem; color: var(--text-sub); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .empty-hint { text-align: center; color: var(--text-sub); grid-column: 1/-1; padding: 60px 0; }
    .modal-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(255, 245, 247, 0.6); backdrop-filter: blur(10px);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    .modal-overlay.active { display: flex; }
    .editor-modal {
      width: 90%; max-width: 700px; max-height: 85vh;
      padding: 40px; display: flex; flex-direction: column;
    }
    .editor-modal .modal-title {
      border: none; background: transparent; font-size: 1.8rem;
      font-weight: 600; width: 100%; outline: none; margin-bottom: 20px;
      color: var(--text-main);
    }
    .editor-body { flex: 1; overflow-y: auto; margin-bottom: 20px; }
    .content-editable {
      min-height: 250px; outline: none; font-size: 1.1rem; line-height: 1.7;
    }
    .content-editable img { max-width: 100%; border-radius: 12px; margin: 10px 0; }
    .content-editable a { color: var(--accent); }
    .editor-footer {
      display: flex; justify-content: space-between; align-items: center;
    }
    .tool-group { display: flex; gap: 12px; }
    .btn {
      padding: 10px 24px; border-radius: 50px; font-weight: 600;
      cursor: pointer; border: none; background: linear-gradient(135deg, #ff9a9e, #fecfef);
      color: #fff; transition: all 0.3s; font-size: 0.95rem;
    }
    .btn-outline {
      background: transparent; border: 1px solid var(--glass-border);
      color: var(--text-main);
    }
    .btn-outline:hover { background: rgba(255,154,158,0.15); }
    .login-box { width: 320px; padding: 40px; text-align: center; }
    .login-box h2 { font-size: 1.5rem; margin-bottom: 30px; }
    .login-box input {
      width: 100%; padding: 14px; border: 1px solid var(--glass-border); border-radius: 16px;
      background: rgba(255,255,255,0.5); font-size: 1.1rem; text-align: center;
      outline: none; margin-bottom: 18px; transition: border 0.3s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box .btn { width: 100%; padding: 14px; font-size: 1.1rem; }
    .error-msg { color: #ff6b6b; font-size: 0.9rem; margin-top: -8px; margin-bottom: 12px; display: none; }
    @media (max-width: 600px) {
      .hero-card h1 { font-size: 2rem; }
      .top-nav { padding: 15px 20px; }
      .nav-btn { padding: 10px 18px; font-size: 0.9rem; }
    }
  </style>
</head>
<body>
  <div class="bg-glow"></div>
  <nav class="top-nav">
    <div class="nav-btns" id="nav-btns-container"></div>
    <button class="nav-btn" id="login-trigger-btn">登录</button>
  </nav>

  <!-- 首页 -->
  <div class="glass-card hero-card" data-tilt id="hero-page">
    <h1>乖宝和溪溪的<br>快乐生活</h1>
    <div class="cover-frame" id="cover-frame">
      <span class="cover-placeholder" id="cover-placeholder">登录后点击“封面”上传你们的照片</span>
      <img id="cover-img" src="" alt="Cover">
      <div class="floating-decos" id="deco-container"></div>
    </div>
  </div>

  <!-- 日记页 -->
  <div id="diary-page">
    <h2 style="font-size:2rem; margin-bottom:20px;">📔 我们的日记</h2>
    <div class="diary-grid" id="diary-grid"></div>
  </div>

  <!-- 登录弹窗 -->
  <div id="login-modal" class="modal-overlay">
    <div class="glass-card login-box" data-tilt>
      <h2>管理员登录</h2>
      <input type="text" id="username-input" placeholder="用户名" autocomplete="off">
      <input type="password" id="password-input" placeholder="密码">
      <div class="error-msg" id="error-msg">用户名或密码错误</div>
      <button class="btn" id="login-submit-btn">确认</button>
    </div>
  </div>

  <!-- 日记编辑器弹窗 -->
  <div id="editor-modal" class="modal-overlay">
    <div class="glass-card editor-modal" id="editor-card">
      <input type="text" class="modal-title" id="editor-title" placeholder="日记标题...">
      <div class="editor-body">
        <div class="content-editable" id="editor-content" contenteditable="true"></div>
      </div>
      <div class="editor-footer">
        <div class="tool-group">
          <button class="btn btn-outline" id="insert-image-btn">🖼️ 图片</button>
          <button class="btn btn-outline" id="attach-file-btn">📎 附件</button>
          <input type="file" id="image-input" accept="image/*" hidden>
          <input type="file" id="file-input" hidden>
        </div>
        <div class="tool-group">
          <button class="btn btn-outline" id="delete-diary-btn">🗑️ 删除</button>
          <button class="btn" id="save-diary-btn">保存</button>
        </div>
      </div>
    </div>
  </div>

  <input type="file" id="cover-file-input" accept="image/*" hidden>

  <script>
    (() => {
      const ADMIN = { user: 'XX', pass: 'YY' };
      const AUTH_KEY = 'xins_auth_session';
      const COVER_KEY = 'xins_cover_base64';
      const DIARY_KEY = 'xins_diary_entries';
      const DB_NAME = 'XinsAttachDB';
      const STORE_NAME = 'attachments';

      let db = null;
      let entries = [];
      let currentDiaryId = null;

      const navContainer = document.getElementById('nav-btns-container');
      const loginTriggerBtn = document.getElementById('login-trigger-btn');
      const heroPage = document.getElementById('hero-page');
      const diaryPage = document.getElementById('diary-page');
      const loginModal = document.getElementById('login-modal');
      const usernameInput = document.getElementById('username-input');
      const passwordInput = document.getElementById('password-input');
      const errorMsg = document.getElementById('error-msg');
      const loginSubmitBtn = document.getElementById('login-submit-btn');
      const coverFrame = document.getElementById('cover-frame');
      const coverImg = document.getElementById('cover-img');
      const coverPlaceholder = document.getElementById('cover-placeholder');
      const coverFileInput = document.getElementById('cover-file-input');
      const decoContainer = document.getElementById('deco-container');
      const diaryGrid = document.getElementById('diary-grid');
      const editorModal = document.getElementById('editor-modal');
      const editorTitle = document.getElementById('editor-title');
      const editorContent = document.getElementById('editor-content');
      const saveDiaryBtn = document.getElementById('save-diary-btn');
      const deleteDiaryBtn = document.getElementById('delete-diary-btn');
      const insertImageBtn = document.getElementById('insert-image-btn');
      const attachFileBtn = document.getElementById('attach-file-btn');
      const imageInput = document.getElementById('image-input');
      const fileInput = document.getElementById('file-input');

      function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
      function stripHtml(html) { const div = document.createElement('div'); div.innerHTML = html; return div.textContent || ''; }

      async function openDB() {
        return new Promise((resolve, reject) => {
          const req = indexedDB.open(DB_NAME, 1);
          req.onupgradeneeded = (e) => {
            const database = e.target.result;
            if (!database.objectStoreNames.contains(STORE_NAME)) database.createObjectStore(STORE_NAME);
          };
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }

      function dbPut(key, value) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.objectStore(STORE_NAME).put(value, key);
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
      }
      function dbGet(key) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readonly');
          const req = tx.objectStore(STORE_NAME).get(key);
          req.onsuccess = () => resolve(req.result);
          req.onerror = () => reject(req.error);
        });
      }
      async function dbDelete(key) {
        return new Promise((resolve, reject) => {
          const tx = db.transaction(STORE_NAME, 'readwrite');
          tx.objectStore(STORE_NAME).delete(key);
          tx.oncomplete = resolve;
          tx.onerror = () => reject(tx.error);
        });
      }

      function isLoggedIn() { return sessionStorage.getItem(AUTH_KEY) === 'true'; }

      function updateNav() {
        navContainer.innerHTML = '';
        if (isLoggedIn()) {
          const enterBtn = document.createElement('button');
          enterBtn.className = 'nav-btn'; enterBtn.textContent = '📔 日记'; enterBtn.onclick = enterDiaryPage;
          const coverBtn = document.createElement('button');
          coverBtn.className = 'nav-btn'; coverBtn.textContent = '🖼️ 封面'; coverBtn.onclick = () => coverFileInput.click();
          navContainer.appendChild(enterBtn); navContainer.appendChild(coverBtn);
          loginTriggerBtn.style.display = 'none';
        } else {
          loginTriggerBtn.style.display = 'inline-block';
        }
        bindTiltToCards();
      }

      loginTriggerBtn.onclick = () => {
        loginModal.classList.add('active');
        usernameInput.value = ''; passwordInput.value = ''; errorMsg.style.display = 'none';
        usernameInput.focus();
      };
      loginModal.onclick = (e) => { if (e.target === loginModal) loginModal.classList.remove('active'); };
      loginSubmitBtn.onclick = () => {
        if (usernameInput.value === ADMIN.user && passwordInput.value === ADMIN.pass) {
          sessionStorage.setItem(AUTH_KEY, 'true');
          loginModal.classList.remove('active');
          updateNav();
        } else {
          errorMsg.style.display = 'block';
          passwordInput.value = '';
        }
      };
      passwordInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') loginSubmitBtn.click(); });

      // ==================== 封面（自适应修复） ====================
      function loadCover() {
        const saved = localStorage.getItem(COVER_KEY);
        if (saved) applyCover(saved);
      }

      function applyCover(src) {
        coverImg.src = src;
        coverFrame.classList.add('has-img');
        coverPlaceholder.style.display = 'none';
        // 图片加载完成后，容器会自动适应图片尺寸
      }

      coverFileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 10 * 1024 * 1024) { alert('封面图片不能超过10MB'); return; }
        const reader = new FileReader();
        reader.onload = (ev) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const maxW = 1200;
            let w = img.width, h = img.height;
            if (w > maxW) {
              h = h * (maxW / w);
              w = maxW;
            }
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, w, h);
            const dataUrl = canvas.toDataURL('image/jpeg', 0.7);
            localStorage.setItem(COVER_KEY, dataUrl);
            applyCover(dataUrl);
          };
          img.src = ev.target.result;
        };
        reader.readAsDataURL(file);
        coverFileInput.value = '';
      };

      function generateDecos() {
        const paths = [
          'M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z',
          'M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z'
        ];
        for (let i = 0; i < 15; i++) {
          const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
          svg.setAttribute('viewBox', '0 0 24 24'); svg.classList.add('deco');
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', paths[Math.floor(Math.random() * paths.length)]);
          svg.appendChild(path);
          const size = Math.random() * 20 + 15;
          svg.style.width = `${size}px`; svg.style.height = `${size}px`;
          svg.style.left = `${Math.random() * 100}%`; svg.style.bottom = `-${size}px`;
          svg.style.animationDuration = `${Math.random() * 10 + 10}s`;
          svg.style.animationDelay = `${Math.random() * 10}s`;
          decoContainer.appendChild(svg);
        }
      }

      // ==================== 日记 ====================
      function loadEntries() {
        const stored = localStorage.getItem(DIARY_KEY);
        entries = stored ? JSON.parse(stored) : [];
      }
      function saveEntries() { localStorage.setItem(DIARY_KEY, JSON.stringify(entries)); }

      function renderDiaryList() {
        const sorted = [...entries].sort((a,b) => b.date - a.date);
        if (sorted.length === 0) {
          diaryGrid.innerHTML = '<div class="empty-hint">🌸 还没有日记，点击右上角“日记”返回首页写一篇吧</div>';
          return;
        }
        diaryGrid.innerHTML = sorted.map(e => `
          <div class="glass-card diary-card" data-id="${e.id}">
            <div class="date">${new Date(e.date).toLocaleDateString()}</div>
            <h3>${escapeHtml(e.title || '无标题')}</h3>
            <p>${escapeHtml(stripHtml(e.content).substring(0, 80))}</p>
          </div>
        `).join('');
        bindTiltToCards();
      }

      function openEditor(id) {
        if (!isLoggedIn()) { alert('请先登录'); return; }
        currentDiaryId = id || null;
        if (id) {
          const entry = entries.find(e => e.id === id);
          editorTitle.value = entry.title || '';
          deserializeContent(entry.content || '');
        } else {
          editorTitle.value = '';
          editorContent.innerHTML = '';
        }
        editorModal.classList.add('active');
        editorTitle.focus();
      }

      function closeEditor() { editorModal.classList.remove('active'); }

      function serializeContent() {
        const div = document.createElement('div');
        div.innerHTML = editorContent.innerHTML;
        div.querySelectorAll('[data-attachment-id]').forEach(el => {
          const attId = el.getAttribute('data-attachment-id');
          if (el.tagName === 'IMG') {
            const span = document.createElement('span');
            span.setAttribute('data-attachment-id', attId);
            span.setAttribute('data-type', 'image');
            el.replaceWith(span);
          } else if (el.tagName === 'A') {
            const span = document.createElement('span');
            span.setAttribute('data-attachment-id', attId);
            span.setAttribute('data-type', 'file');
            span.textContent = el.textContent;
            el.replaceWith(span);
          }
        });
        return div.innerHTML;
      }

      async function deserializeContent(html) {
        const div = document.createElement('div');
        div.innerHTML = html;
        const placeholders = div.querySelectorAll('[data-attachment-id]');
        for (const el of placeholders) {
          const attId = el.getAttribute('data-attachment-id');
          const type = el.getAttribute('data-type');
          try {
            const data = await dbGet(attId);
            if (data && data.blob) {
              const url = URL.createObjectURL(data.blob);
              if (type === 'image') {
                const img = document.createElement('img');
                img.src = url;
                img.setAttribute('data-attachment-id', attId);
                el.replaceWith(img);
              } else {
                const a = document.createElement('a');
                a.href = url;
                a.download = data.name;
                a.textContent = data.name;
                a.setAttribute('data-attachment-id', attId);
                a.onclick = (e) => {
                  e.preventDefault();
                  const dUrl = URL.createObjectURL(data.blob);
                  const tmpA = document.createElement('a');
                  tmpA.href = dUrl;
                  tmpA.download = data.name;
                  tmpA.click();
                };
                el.replaceWith(a);
              }
            }
          } catch (e) {
            el.replaceWith(document.createTextNode('[附件丢失]'));
          }
        }
        editorContent.innerHTML = div.innerHTML;
      }

      async function saveDiary() {
        const title = editorTitle.value.trim();
        const content = serializeContent();
        if (!title && !content) { alert('标题和内容不能都为空'); return; }
        const now = Date.now();
        if (currentDiaryId) {
          const entry = entries.find(e => e.id === currentDiaryId);
          if (entry) { entry.title = title; entry.content = content; entry.date = now; }
        } else {
          currentDiaryId = now;
          entries.push({ id: now, date: now, title, content });
        }
        saveEntries();
        closeEditor();
        renderDiaryList();
      }

      async function deleteDiary() {
        if (!currentDiaryId) return;
        if (!confirm('确定删除这篇日记吗？')) return;
        const tx = db.transaction(STORE_NAME, 'readwrite');
        const store = tx.objectStore(STORE_NAME);
        const allKeys = await new Promise(resolve => { const req = store.getAllKeys(); req.onsuccess = () => resolve(req.result); });
        for (const key of allKeys) { if (key.startsWith(`att_${currentDiaryId}_`)) store.delete(key); }
        await new Promise(resolve => { tx.oncomplete = resolve; });
        entries = entries.filter(e => e.id !== currentDiaryId);
        saveEntries();
        closeEditor();
        renderDiaryList();
      }

      async function insertImage(file) {
        const attId = `att_${currentDiaryId || 0}_${Date.now()}`;
        await dbPut(attId, { blob: file, name: file.name });
        const url = URL.createObjectURL(file);
        const img = document.createElement('img');
        img.src = url;
        img.setAttribute('data-attachment-id', attId);
        editorContent.focus();
        document.execCommand('insertHTML', false, img.outerHTML);
      }

      async function insertFile(file) {
        const attId = `att_${currentDiaryId || 0}_${Date.now()}`;
        await dbPut(attId, { blob: file, name: file.name });
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = file.name;
        a.setAttribute('data-attachment-id', attId);
        a.onclick = (e) => {
          e.preventDefault();
          dbGet(attId).then(data => {
            const url = URL.createObjectURL(data.blob);
            const tmpA = document.createElement('a');
            tmpA.href = url; tmpA.download = data.name; tmpA.click();
          });
        };
        editorContent.focus();
        document.execCommand('insertHTML', false, a.outerHTML);
      }

      function enterDiaryPage() {
        if (!isLoggedIn()) { alert('请先登录'); return; }
        heroPage.style.opacity = '0'; heroPage.style.transform = 'rotateX(10deg) scale(0.95)';
        setTimeout(() => {
          heroPage.style.display = 'none';
          diaryPage.style.display = 'block';
          diaryPage.style.opacity = '1';
          loadEntries();
          renderDiaryList();
        }, 400);
      }

      // 双击顶部返回首页
      let clickTimer;
      document.querySelector('.top-nav').addEventListener('click', (e) => {
        if (e.target.classList.contains('nav-btn') || e.target.id === 'login-trigger-btn') return;
        if (clickTimer) { clearTimeout(clickTimer); clickTimer = null;
          diaryPage.style.display = 'none'; heroPage.style.display = ''; heroPage.style.opacity = '1'; heroPage.style.transform = '';
        } else { clickTimer = setTimeout(() => { clickTimer = null; }, 300); }
      });

      diaryGrid.addEventListener('click', (e) => {
        const card = e.target.closest('.diary-card');
        if (card) { const id = Number(card.dataset.id); openEditor(id); }
      });

      saveDiaryBtn.onclick = saveDiary;
      deleteDiaryBtn.onclick = deleteDiary;
      insertImageBtn.onclick = () => imageInput.click();
      imageInput.onchange = () => { const file = imageInput.files[0]; if (file) insertImage(file); imageInput.value = ''; };
      attachFileBtn.onclick = () => fileInput.click();
      fileInput.onchange = () => { const file = fileInput.files[0]; if (file) insertFile(file); fileInput.value = ''; };

      editorContent.addEventListener('paste', (e) => {
        const items = e.clipboardData.items;
        for (const item of items) {
          if (item.type.startsWith('image/')) {
            e.preventDefault();
            const blob = item.getAsFile();
            insertImage(blob);
            break;
          }
        }
      });

      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          if (editorModal.classList.contains('active')) saveDiary();
        }
      });

      editorModal.addEventListener('click', (e) => { if (e.target === editorModal) closeEditor(); });

      function bindTiltToCards() {
        document.querySelectorAll('.glass-card').forEach(card => {
          if (card.dataset.tiltBound) return;
          card.dataset.tiltBound = true;
          card.addEventListener('mousemove', (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const rotateY = ((x - rect.width / 2) / (rect.width / 2)) * 10;
            const rotateX = ((rect.height / 2 - y) / (rect.height / 2)) * 10;
            card.style.transform = `rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale(1.02)`;
            card.style.setProperty('--mouse-x', `${x}px`);
            card.style.setProperty('--mouse-y', `${y}px`);
          });
          card.addEventListener('mouseleave', () => { card.style.transform = 'rotateX(0) rotateY(0) scale(1)'; });
        });
      }

      async function init() {
        try { db = await openDB(); } catch (e) { console.warn('附件数据库打开失败'); }
        loadCover();
        generateDecos();
        updateNav();
        bindTiltToCards();
        heroPage.style.display = ''; diaryPage.style.display = 'none';
      }

      window.onload = init;
    })();
  </script>
</body>
</html>
