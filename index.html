<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fluid Glass | 极致动效模板</title>
  <style>
    /* === 1. 核心重置与全局变量 === */
    :root {
      --bg-color: #0a0a0a;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #ffffff;
      --text-sub: rgba(255, 255, 255, 0.6);
      --accent: #7000ff; /* 高级紫 */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }
    
    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      perspective: 1000px; /* 3D视角准备 */
    }

    /* === 2. 极致背景：液态渐变光晕 === */
    .bg-glow {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120vw; height: 120vh;
      background: radial-gradient(circle at 30% 40%, rgba(112, 0, 255, 0.15) 0%, transparent 50%),
                  radial-gradient(circle at 70% 60%, rgba(0, 150, 255, 0.1) 0%, transparent 50%);
      filter: blur(80px);
      z-index: 0;
      animation: breathe 10s infinite alternate ease-in-out;
    }

    @keyframes breathe {
      0% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
      100% { transform: translate(-50%, -50%) scale(1.2) rotate(10deg); }
    }

    /* === 3. 核心卡片：毛玻璃与3D交互 === */
    .glass-card {
      position: relative;
      z-index: 10;
      width: 90%; max-width: 600px;
      padding: 60px;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
      transition: transform 0.1s ease-out, box-shadow 0.3s ease;
      text-align: center;
    }

    /* 鼠标跟随的高光效果 */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: 24px;
      background: radial-gradient(circle at var(--mouse-x) var(--mouse-y), rgba(255,255,255,0.1) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .glass-card:hover::before { opacity: 1; }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -1px;
      margin-bottom: 16px;
      background: linear-gradient(to right, #fff, rgba(255,255,255,0.6));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p { font-size: 1.1rem; color: var(--text-sub); line-height: 1.6; margin-bottom: 40px; }

    .btn {
      display: inline-block;
      padding: 14px 36px;
      background: var(--text-main);
      color: var(--bg-color);
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      font-size: 1rem;
      transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .btn:hover { transform: translateY(-3px) scale(1.05); box-shadow: 0 10px 20px rgba(255,255,255,0.2); }

    /* === 4. 移动端适配 === */
    @media (max-width: 768px) {
      .glass-card { padding: 40px 30px; }
      h1 { font-size: 2rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="bg-glow"></div>

  <div class="glass-card" id="card">
    <h1>Fluid Glass</h1>
    <p>这是一个零依赖、极致丝滑的通用网页模板。<br>移动你的鼠标，感受液态玻璃的光影跟随与3D微动效。</p>
    <a href="#" class="btn">探索更多</a>
  </div>

  <script>
    // 核心动效逻辑：鼠标跟随 3D 倾斜 + 高光追踪
    const card = document.getElementById('card');

    document.addEventListener('mousemove', (e) => {
      const xAxis = (window.innerWidth / 2 - e.pageX) / 25;
      const yAxis = (window.innerHeight / 2 - e.pageY) / 25;
      
      // 3D 倾斜
      card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
      
      // 高光位置追踪
      const rect = card.getBoundingClientRect();
      const x = ((e.clientX - rect.left) / rect.width) * 100;
      const y = ((e.clientY - rect.top) / rect.height) * 100;
      card.style.setProperty('--mouse-x', `${x}%`);
      card.style.setProperty('--mouse-y', `${y}%`);
    });

    // 鼠标移出时平滑复位
    document.addEventListener('mouseleave', () => {
      card.style.transition = 'transform 0.5s ease';
      card.style.transform = `rotateY(0deg) rotateX(0deg)`;
      setTimeout(() => { card.style.transition = 'transform 0.1s ease-out, box-shadow 0.3s ease'; }, 500);
    });
  </script>
</body>
</html>
