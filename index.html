<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>乖宝和溪溪的快乐生活</title>
  <style>
    :root {
      --google-blue: #1a73e8;
      --google-gray: #f1f3f4;
      --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      --liquid-glow: 0 0 15px var(--google-blue), 0 0 30px rgba(26, 115, 232, 0.5);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Google Sans', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background-color: #fff;
      color: #202124;
      overflow: hidden;
      height: 100vh;
      position: relative;
      animation: liquidGlow 8s infinite alternate;
    }

    @keyframes liquidGlow {
      0% { text-shadow: 0 0 5px var(--google-blue); }
      100% { text-shadow: 0 0 20px var(--google-blue), 0 0 35px rgba(26, 115, 232, 0.7); }
    }

    /* === 封面页样式 === */
    #cover-wrapper {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: var(--glass-shadow);
      background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
      transition: transform 0.3s ease;
      z-index: 10;
      display: flex;
      flex-direction: column;
    }

    .cover-nav {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(10px);
      z-index: 20;
    }

    .cover-title {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--google-blue);
      cursor: pointer;
      user-select: none;
    }

    .cover-actions button {
      background: var(--google-blue);
      color: white;
      border: none;
      border-radius: 16px;
      padding: 6px 16px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--liquid-glow);
    }

    .cover-actions button:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px var(--google-blue);
    }

    #cover-image-container {
      flex: 1;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      overflow: hidden;
    }

    #cover-image {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      transition: opacity 0.3s;
    }

    .decoration {
      position: absolute;
      pointer-events: none;
      animation: float 15s infinite linear;
      opacity: 0.8;
      z-index: 5;
    }

    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(10deg); }
      100% { transform: translateY(0) rotate(0deg); }
    }

    /* === 日记界面样式 === */
    #diary-app {
      display: none;
      height: 100vh;
      display: flex;
      background: #fff;
    }

    .sidebar {
      width: 240px;
      border-right: 1px solid #dadce0;
      padding: 16px;
      background: var(--google-gray);
      overflow-y: auto;
      flex-shrink: 0;
    }

    .compose-btn {
      width: 100%;
      background: var(--google-blue);
      color: white;
      border: none;
      border-radius: 24px;
      padding: 12px;
      font-weight: 500;
      cursor: pointer;
      margin-bottom: 16px;
      box-shadow: var(--liquid-glow);
      transition: all 0.2s;
    }

    .compose-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 0 25px var(--google-blue);
    }

    .diary-list {
      list-style: none;
      padding: 8px 0;
    }

    .diary-item {
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .diary-item:hover {
      background: #f8f9fa;
    }

    .diary-item.active {
      background: rgba(26, 115, 232, 0.1);
      border-left: 3px solid var(--google-blue);
    }

    .diary-date {
      font-size: 0.75rem;
      color: #5f6368;
      margin-bottom: 4px;
    }

    .diary-title {
      font-weight: 500;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid #dadce0;
      overflow: hidden;
    }

    .editor-header {
      padding: 16px;
      border-bottom: 1px solid #dadce0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .editor-title {
      font-size: 1.25rem;
      font-weight: 500;
      border: none;
      background: transparent;
      width: 100%;
      padding: 8px 0;
      outline: none;
    }

    .editor-actions button {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 16px;
      padding: 6px 12px;
      margin-left: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .editor-actions button:hover {
      background: #f8f9fa;
      border-color: #d2e3fc;
    }

    #editor {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      outline: none;
      min-height: 200px;
    }

    #editor:empty:before {
      content: "写点什么吧...";
      color: #70757a;
    }

    /* === 通用组件 === */
    .hidden {
      display: none !important;
    }

    .login-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .modal-content {
      background: white;
      border-radius: 16px;
      padding: 24px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    .modal-title {
      text-align: center;
      margin-bottom: 20px;
      color: var(--google-blue);
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      margin-bottom: 6px;
      font-weight: 500;
    }

    .input-group input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      font-size: 1rem;
    }

    .modal-btn {
      width: 100%;
      padding: 12px;
      background: var(--google-blue);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      cursor: pointer;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: white;
      padding: 10px 20px;
      border-radius: 24px;
      font-size: 0.9rem;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 1000;
    }

    /* === 移动端适配 === */
    @media (max-width: 768px) {
      .sidebar {
        width: 60px;
        padding: 12px 0;
      }
      .compose-btn, .diary-title, .diary-date {
        display: none;
      }
      .diary-item {
        justify-content: center;
        padding: 16px;
      }
      .main-content {
        border: none;
      }
    }
  </style>
</head>
<body>
  <!-- === 封面页 === -->
  <div id="cover-wrapper">
    <nav class="cover-nav">
      <div class="cover-title" id="nav-to-diary">乖宝和溪溪的快乐生活</div>
      <div class="cover-actions">
        <button id="login-btn" class="hidden">登录</button>
        <button id="change-cover-btn" class="hidden">🖼️ 更换封面</button>
        <button id="logout-btn" class="hidden">退出</button>
      </div>
    </nav>
    
    <div id="cover-image-container">
      <img id="cover-image" src="" alt="封面图片">
    </div>
  </div>

  <!-- === 日记界面 === -->
  <div id="diary-app">
    <div class="sidebar">
      <button id="compose-btn" class="compose-btn">写新日记</button>
      <ul class="diary-list" id="diary-list"></ul>
    </div>
    
    <div class="main-content">
      <div class="editor-header">
        <input type="text" class="editor-title" id="editor-title" placeholder="日记标题">
        <div class="editor-actions">
          <button id="insert-image">插入图片</button>
          <button id="attach-file">附件</button>
          <button id="save-diary">保存</button>
        </div>
      </div>
      <div id="editor" contenteditable="true"></div>
    </div>
  </div>

  <!-- === 登录弹窗 === -->
  <div id="login-modal" class="login-modal hidden">
    <div class="modal-content">
      <h2 class="modal-title">管理员登录</h2>
      <div class="input-group">
        <label for="username">用户名</label>
        <input type="text" id="username" value="XX">
      </div>
      <div class="input-group">
        <label for="password">密码</label>
        <input type="password" id="password" value="YY">
      </div>
      <button class="modal-btn" id="login-submit">登录</button>
    </div>
  </div>

  <!-- === 封面更换弹窗 === -->
  <div id="cover-modal" class="login-modal hidden">
    <div class="modal-content">
      <h2 class="modal-title">更换封面</h2>
      <input type="file" id="cover-upload" accept="image/*" style="display: none;">
      <div style="text-align: center; margin: 16px 0;">
        <button class="modal-btn" id="upload-trigger">选择图片 (≤10MB)</button>
      </div>
      <div id="cover-preview" style="text-align: center; margin: 16px 0;"></div>
      <button class="modal-btn" id="save-cover" disabled>保存封面</button>
    </div>
  </div>

  <!-- === 全局提示 === -->
  <div id="toast" class="toast"></div>

  <script>
    // ===== 配置常量 =====
    const ADMIN = { username: 'XX', password: 'YY' };
    const COVER_KEY = 'xins_tech_cover_base64';
    const DIARY_KEY = 'xins_tech_diary';
    const DB_NAME = 'DiaryAttachments';
    const STORE_NAME = 'attachments';

    // ===== 核心状态管理 =====
    let isAdmin = false;
    let currentDiaryId = null;
    let coverImageBase64 = null;

    // ===== DOM 元素缓存 =====
    const $ = (id) => document.getElementById(id);
    const els = {
      coverWrapper: $('cover-wrapper'),
      coverImage: $('cover-image'),
      navToDiary: $('nav-to-diary'),
      loginBtn: $('login-btn'),
      logoutBtn: $('logout-btn'),
      changeCoverBtn: $('change-cover-btn'),
      diaryApp: $('diary-app'),
      loginModal: $('login-modal'),
      coverModal: $('cover-modal'),
      coverUpload: $('cover-upload'),
      coverPreview: $('cover-preview'),
      saveCover: $('save-cover'),
      uploadTrigger: $('upload-trigger'),
      toast: $('toast'),
      diaryList: $('diary-list'),
      composeBtn: $('compose-btn'),
      editorTitle: $('editor-title'),
      editor: $('editor'),
      saveDiary: $('save-diary'),
      insertImage: $('insert-image'),
      attachFile: $('attach-file'),
      loginSubmit: $('login-submit'),
      username: $('username'),
      password: $('password')
    };

    // ===== 工具函数 =====
    function showToast(message, duration = 2000) {
      els.toast.textContent = message;
      els.toast.style.opacity = '1';
      setTimeout(() => { els.toast.style.opacity = '0'; }, duration);
    }

    function isMobile() {
      return /iPhone|iPad|iPod|Android|webOS|BlackBerry|Windows Phone/i.test(navigator.userAgent);
    }

    // ===== 封面管理 =====
    function loadCover() {
      coverImageBase64 = localStorage.getItem(COVER_KEY);
      if (coverImageBase64) {
        els.coverImage.src = coverImageBase64;
        els.coverImage.style.opacity = '1';
      } else {
        // 默认封面（樱花背景）
        els.coverImage.src = 'data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMjAwIj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWxsPSIjZmZmIi8+PHBhdGggZD0iTTUwIDUwQzUwIDMwIDcwIDMwIDcwIDUwIDcwIDcwIDUwIDcwIDUwIDUweiIgZmlsbD0iI2ZmY2NlZSIvPjxwYXRoIGQ9Ik0xMDAgNTBDMTAwIDMwIDEyMCAzMCAxMjAgNTAgMTIwIDcwIDEwMCA3MCAxMDAgNTB6IiBmaWxsPSIjZmZjY2VlIi8+PHBhdGggZD0iTTIwMCA1MEMyMDAgMzAgMjIwIDMwIDIyMCA1MCAyMjAgNzAgMjAwIDcwIDIwMCA1MHoiIGZpbGw9IiNmZmNjZWUiLz48cGF0aCBkPSJNMjUwIDUwQzI1MCAzMCAyNzAgMzAgMjcwIDUwIDI3MCA3MCAyNTAgNzAgMjUwIDUweiIgZmlsbD0iI2ZmY2NlZSIvPjx0ZXh0IHg9IjE1MCIgeT0iMTAwIiBmb250LWZhbWlseT0iQXJpYWwiIGZvbnQtc2l6ZT0iMjAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IiMxYTczZTgiPkhpISBZb3VyIENvdmVyPC90ZXh0Pjwvc3ZnPg==';
        els.coverImage.style.opacity = '0.7';
      }
      createDecorations();
    }

    function createDecorations() {
      const container = els.coverImageContainer;
      const types = ['🌸', '✨', '🪶'];
      
      // 清除旧装饰
      document.querySelectorAll('.decoration').forEach(el => el.remove());
      
      // 创建背景层装饰（随机分布）
      for (let i = 0; i < 15; i++) {
        const deco = document.createElement('div');
        deco.className = 'decoration';
        deco.textContent = types[Math.floor(Math.random() * types.length)];
        deco.style.fontSize = `${Math.random() * 20 + 10}px`;
        deco.style.left = `${Math.random() * 100}%`;
        deco.style.top = `${Math.random() * 100}%`;
        deco.style.animationDuration = `${Math.random() * 10 + 10}s`;
        container.appendChild(deco);
      }
      
      // 创建图片周边装饰（根据图片位置计算）
      if (els.coverImage.src && els.coverImage.offsetWidth > 0) {
        const imgRect = els.coverImage.getBoundingClientRect();
        const wrapperRect = container.getBoundingClientRect();
        
        const positions = [
          { top: `${imgRect.top - wrapperRect.top - 40}px`, left: `${imgRect.left - wrapperRect.left}px` },
          { top: `${imgRect.top - wrapperRect.top}px`, left: `${imgRect.right - wrapperRect.left + 20}px` },
          { top: `${imgRect.bottom - wrapperRect.top + 20}px`, left: `${imgRect.left - wrapperRect.left}px` },
          { top: `${imgRect.bottom - wrapperRect.top}px`, left: `${imgRect.right - wrapperRect.left + 40}px` }
        ];
        
        positions.forEach(pos => {
          const deco = document.createElement('div');
          deco.className = 'decoration';
          deco.textContent = types[Math.floor(Math.random() * types.length)];
          deco.style.fontSize = '24px';
          deco.style.position = 'absolute';
          deco.style.top = pos.top;
          deco.style.left = pos.left;
          deco.style.animationDuration = '12s';
          container.appendChild(deco);
        });
      }
    }

    function compressAndSaveCover(file) {
      if (file.size > 10 * 1024 * 1024) {
        showToast('图片太大！请上传 ≤10MB 的图片');
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_WIDTH = 1200;
          let width = img.width;
          let height = img.height;
          
          if (width > MAX_WIDTH) {
            height *= MAX_WIDTH / width;
            width = MAX_WIDTH;
          }
          
          canvas.width = width;
          canvas.height = height;
          
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, width, height);
          
          // 生成 Base64 (JPEG 质量 0.7)
          const base64 = canvas.toDataURL('image/jpeg', 0.7);
          
          // 验证大小 (<5MB)
          if (base64.length > 5 * 1024 * 1024) {
            showToast('压缩后仍过大，请换更小图片');
            return;
          }
          
          // 预览
          const previewImg = document.createElement('img');
          previewImg.src = base64;
          previewImg.style.maxWidth = '100%';
          previewImg.style.maxHeight = '300px';
          previewImg.style.borderRadius = '12px';
          els.coverPreview.innerHTML = '';
          els.coverPreview.appendChild(previewImg);
          
          // 启用保存按钮
          coverImageBase64 = base64;
          els.saveCover.disabled = false;
        };
        img.src = e.target.result;
      };
      reader.readAsDataURL(file);
    }

    // ===== 登录管理 =====
    function checkAuth() {
      isAdmin = localStorage.getItem('g_admin') === 'true';
      updateAuthUI();
    }

    function updateAuthUI() {
      els.loginBtn.classList.toggle('hidden', isAdmin);
      els.logoutBtn.classList.toggle('hidden', !isAdmin);
      els.changeCoverBtn.classList.toggle('hidden', !isAdmin);
      
      // 日记界面控件
      const editControls = document.querySelectorAll('.editor-actions button:not(#save-diary)');
      editControls.forEach(btn => btn.disabled = !isAdmin);
      els.saveDiary.disabled = !isAdmin;
      
      // 侧边栏按钮
      els.composeBtn.classList.toggle('hidden', !isAdmin);
    }

    function login() {
      if (els.username.value === ADMIN.username && els.password.value === ADMIN.password) {
        localStorage.setItem('g_admin', 'true');
        isAdmin = true;
        els.loginModal.classList.add('hidden');
        updateAuthUI();
        showToast('登录成功！');
      } else {
        showToast('用户名或密码错误');
      }
    }

    // ===== IndexedDB 管理 (附件存储) =====
    let db = null;

    function openDB() {
      return new Promise((resolve, reject) => {
        if (db) return resolve(db);
        
        const request = indexedDB.open(DB_NAME, 1);
        
        request.onupgradeneeded = function(e) {
          const db = e.target.result;
          if (!db.objectStoreNames.contains(STORE_NAME)) {
            db.createObjectStore(STORE_NAME, { keyPath: 'id' });
          }
        };
        
        request.onsuccess = function(e) {
          db = e.target.result;
          resolve(db);
        };
        
        request.onerror = function(e) {
          reject(e.target.error);
        };
      });
    }

    async function saveAttachment(blob, fileName, diaryId) {
      await openDB();
      const id = `att_${diaryId}_${Date.now()}`;
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      
      return new Promise((resolve, reject) => {
        transaction.oncomplete = () => resolve(id);
        transaction.onerror = reject;
        store.put({ id, blob, fileName, diaryId });
      });
    }

    async function getAttachment(id) {
      await openDB();
      const transaction = db.transaction([STORE_NAME], 'readonly');
      const store = transaction.objectStore(STORE_NAME);
      
      return new Promise((resolve, reject) => {
        const request = store.get(id);
        request.onsuccess = () => resolve(request.result);
        request.onerror = reject;
      });
    }

    async function deleteAttachmentsByDiary(diaryId) {
      await openDB();
      const transaction = db.transaction([STORE_NAME], 'readwrite');
      const store = transaction.objectStore(STORE_NAME);
      
      return new Promise((resolve, reject) => {
        const index = store.index('diaryId');
        const request = index.openCursor(IDBKeyRange.only(diaryId));
        
        request.onsuccess = function() {
          const cursor = request.result;
          if (cursor) {
            cursor.delete();
            cursor.continue();
          } else {
            resolve();
          }
        };
        
        transaction.oncomplete = resolve;
        transaction.onerror = reject;
      });
    }

    // ===== 日记数据管理 =====
    function loadDiaries() {
      const diaries = JSON.parse(localStorage.getItem(DIARY_KEY) || '[]');
      els.diaryList.innerHTML = '';
      
      diaries.sort((a, b) => new Date(b.date) - new Date(a.date))
        .forEach(diary => {
          const li = document.createElement('li');
          li.className = 'diary-item';
          li.dataset.id = diary.id;
          li.innerHTML = `
            <div class="diary-date">${formatDate(diary.date)}</div>
            <div class="diary-title">${diary.title}</div>
          `;
          li.addEventListener('click', () => openDiary(diary));
          els.diaryList.appendChild(li);
        });
    }

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      return `${date.getFullYear()}-${(date.getMonth()+1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')}`;
    }

    function openDiary(diary) {
      currentDiaryId = diary.id;
      els.editorTitle.value = diary.title;
      els.editor.innerHTML = diary.content;
      
      // 激活列表项
      document.querySelectorAll('.diary-item').forEach(el => {
        el.classList.toggle('active', el.dataset.id === diary.id);
      });
    }

    function saveCurrentDiary() {
      if (!currentDiaryId) return;
      
      const diaries = JSON.parse(localStorage.getItem(DIARY_KEY) || '[]');
      const index = diaries.findIndex(d => d.id === currentDiaryId);
      
      if (index !== -1) {
        diaries[index] = {
          ...diaries[index],
          title: els.editorTitle.value,
          content: els.editor.innerHTML,
          date: new Date().toISOString()
        };
      }
      
      localStorage.setItem(DIARY_KEY, JSON.stringify(diaries));
      showToast('已保存');
      loadDiaries(); // 刷新列表
    }

    function createNewDiary() {
      const newId = `diary_${Date.now()}`;
      const newDiary = {
        id: newId,
        title: '新日记',
        content: '',
        date: new Date().toISOString()
      };
      
      const diaries = JSON.parse(localStorage.getItem(DIARY_KEY) || '[]');
      diaries.push(newDiary);
      localStorage.setItem(DIARY_KEY, JSON.stringify(diaries));
      
      currentDiaryId = newId;
      els.editorTitle.value = newDiary.title;
      els.editor.innerHTML = '';
      loadDiaries();
      document.querySelector(`.diary-item[data-id="${newId}"]`).classList.add('active');
    }

    // ===== 附件处理 =====
    async function handleImageInsert() {
      const input = document.createElement('input');
      input.type = 'file';
      input.accept = 'image/*';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const blob = new Blob([await file.arrayBuffer()], { type: file.type });
        const id = await saveAttachment(blob, file.name, currentDiaryId);
        
        // 插入编辑器
        const url = URL.createObjectURL(blob);
        const img = document.createElement('img');
        img.src = url;
        img.setAttribute('data-attachment-id', id);
        img.setAttribute('data-type', 'image');
        img.style.maxWidth = '100%';
        img.style.borderRadius = '8px';
        
        // 释放 URL
        img.onload = () => URL.revokeObjectURL(url);
        
        document.execCommand('insertHTML', false, img.outerHTML);
      };
      input.click();
    }

    async function handleFileAttach() {
      const input = document.createElement('input');
      input.type = 'file';
      input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        const blob = new Blob([await file.arrayBuffer()], { type: file.type });
        const id = await saveAttachment(blob, file.name, currentDiaryId);
        
        // 创建下载链接
        const a = document.createElement('a');
        a.href = '#';
        a.textContent = file.name;
        a.setAttribute('data-attachment-id', id);
        a.setAttribute('data-type', 'file');
        a.style.display = 'block';
        a.style.margin = '10px 0';
        a.style.color = 'var(--google-blue)';
        
        a.onclick = async (e) => {
          e.preventDefault();
          const attachment = await getAttachment(id);
          const url = URL.createObjectURL(attachment.blob);
          const downloadLink = document.createElement('a');
          downloadLink.href = url;
          downloadLink.download = attachment.fileName;
          document.body.appendChild(downloadLink);
          downloadLink.click();
          document.body.removeChild(downloadLink);
          URL.revokeObjectURL(url);
        };
        
        document.execCommand('insertHTML', false, a.outerHTML);
      };
      input.click();
    }

    // ===== 初始化 =====
    function init() {
      // 加载封面
      loadCover();
      
      // 检查登录状态
      checkAuth();
      
      // 加载日记列表
      loadDiaries();
      
      // 事件绑定
      els.navToDiary.addEventListener('click', () => {
        if (!isAdmin) {
          els.loginModal.classList.remove('hidden');
          return;
        }
        els.coverWrapper.style.transform = 'scale(0.95)';
        setTimeout(() => {
          els.coverWrapper.style.display = 'none';
          els.diaryApp.style.display = 'flex';
        }, 300);
      });
      
      els.loginBtn.addEventListener('click', () => {
        els.loginModal.classList.remove('hidden');
      });
      
      els.logoutBtn.addEventListener('click', () => {
        localStorage.removeItem('g_admin');
        isAdmin = false;
        updateAuthUI();
        showToast('已退出登录');
        
        // 返回封面
        els.diaryApp.style.display = 'none';
        els.coverWrapper.style.display = 'flex';
        setTimeout(() => {
          els.coverWrapper.style.transform = 'scale(1)';
        }, 10);
      });
      
      els.loginSubmit.addEventListener('click', login);
      
      // 封面更换逻辑
      els.changeCoverBtn.addEventListener('click', () => {
        els.coverModal.classList.remove('hidden');
        els.coverPreview.innerHTML = '';
        els.saveCover.disabled = true;
      });
      
      els.uploadTrigger.addEventListener('click', () => els.coverUpload.click());
      
      els.coverUpload.addEventListener('change', (e) => {
        if (e.target.files[0]) {
          compressAndSaveCover(e.target.files[0]);
        }
      });
      
      els.saveCover.addEventListener('click', () => {
        if (coverImageBase64) {
          localStorage.setItem(COVER_KEY, coverImageBase64);
          loadCover();
          els.coverModal.classList.add('hidden');
          showToast('封面已更新！');
        }
      });
      
      // 日记功能
      els.composeBtn.addEventListener('click', createNewDiary);
      els.saveDiary.addEventListener('click', saveCurrentDiary);
      els.insertImage.addEventListener('click', handleImageInsert);
      els.attachFile.addEventListener('click', handleFileAttach);
      
      // 快捷键支持
      document.addEventListener('keydown', (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === 's') {
          e.preventDefault();
          if (isAdmin && currentDiaryId) saveCurrentDiary();
        }
      });
      
      // 移动端优化
      if (isMobile()) {
        els.coverImageContainer.style.touchAction = 'manipulation';
        document.body.style.touchAction = 'pan-y';
      }
    }

    // ===== 启动应用 =====
    window.addEventListener('DOMContentLoaded', () => {
      init();
      
      // 监听窗口大小变化（移动端适配）
      window.addEventListener('resize', createDecorations);
      
      // 监听图片加载完成（动态装饰定位）
      els.coverImage.addEventListener('load', createDecorations);
    });
  </script>
</body>
</html>
