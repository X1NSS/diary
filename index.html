<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>乖宝和溪溪的快乐生活</title>
    <style>
        :root {
            --google-blue: #1a73e8;
            --google-blue-hover: #1669d0;
            --google-red: #ea4335;
            --bg-white: #fff;
            --text-primary: #202124;
            --text-secondary: #5f6368;
            --border-color: #dadce0;
        }
        * { margin:0; padding:0; box-sizing:border-box; }

        @keyframes liquidGlassText {
            0% { text-shadow: 0 0 8px rgba(255,255,255,0.4), 0 2px 8px rgba(26,115,232,0.3); }
            50% { text-shadow: 0 4px 16px rgba(255,255,255,0.6), 0 6px 16px rgba(26,115,232,0.5); }
            100% { text-shadow: 0 0 8px rgba(255,255,255,0.4), 0 2px 8px rgba(26,115,232,0.3); }
        }
        @keyframes liquidGlassBox {
            0% { box-shadow: 0 4px 12px rgba(26,115,232,0.15), 0 1px 4px rgba(0,0,0,0.08); }
            50% { box-shadow: 0 8px 24px rgba(26,115,232,0.25), 0 2px 8px rgba(0,0,0,0.12); }
            100% { box-shadow: 0 4px 12px rgba(26,115,232,0.15), 0 1px 4px rgba(0,0,0,0.08); }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #fff; color: var(--text-primary); height: 100vh; overflow: hidden;
            animation: liquidGlassText 4s infinite ease-in-out;
        }

        .home-screen { width:100%; height:100vh; display:flex; flex-direction:column; background: #fff; position: relative; }
        .home-screen.hidden { display:none; }
        .top-bar {
            display:flex; align-items:center; justify-content:space-between; padding:12px 24px;
            height:60px; z-index:10; background: rgba(255,255,255,0.8); backdrop-filter: blur(10px);
        }
        .brand-link {
            text-decoration:none; color:var(--text-primary); font-size:14px; font-weight:500;
            padding:8px 12px; border-radius:20px; cursor:pointer; transition:background 0.2s;
        }
        .brand-link:hover { background:rgba(60,64,67,0.08); }
        .top-right { display:flex; gap:12px; align-items:center; }
        .btn-login, .btn-logout {
            background:var(--google-blue); color:white; border:none; font-size:14px; font-weight:500;
            padding:8px 22px; border-radius:4px; cursor:pointer; transition:background 0.2s;
            animation: liquidGlassBox 4s infinite ease-in-out;
        }
        .btn-logout { background:transparent; color:var(--google-blue); border:1px solid var(--border-color); }
        .cover-change-btn {
            background:transparent; border:1px solid var(--border-color); color:var(--text-secondary);
            padding:7px 16px; border-radius:4px; cursor:pointer; display:flex; align-items:center; gap:6px;
            visibility:hidden; font-size:13px; animation: liquidGlassBox 4s infinite ease-in-out;
        }
        .cover-change-btn.visible { visibility:visible; }
        .save-cover-btn {
            background: var(--google-blue); color: white; border: none; padding: 6px 16px;
            border-radius: 4px; cursor: pointer; display: none; margin-left: 8px; font-size: 13px;
            animation: liquidGlassBox 4s infinite ease-in-out;
        }
        .save-cover-btn.show { display: inline-block; }

        /* 封面容器 */
        .cover-wrapper {
            flex:1; position:relative; margin:0 24px 24px; border-radius:28px; overflow:hidden;
            background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 50%, #fce4ec 100%);
            display:flex; align-items:center; justify-content:center;
        }
        .image-container {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .cover-img {
            max-width: 100%; max-height: 100%;
            object-fit: contain;
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.9), 0 0 60px rgba(255, 192, 203, 0.6), 0 10px 40px rgba(0,0,0,0.1);
        }
        .image-container::after {
            content: '';
            position: absolute; inset: -20px;
            background: radial-gradient(ellipse at center, transparent 40%, rgba(252,228,236,0.7) 100%);
            pointer-events: none; border-radius: 50%; z-index: -1;
        }
        .cover-placeholder {
            font-size:6rem; color:#f48fb1; opacity:0.6; z-index:2;
            animation: liquidGlassText 4s infinite ease-in-out;
        }

        .floating-elements { position:absolute; inset:0; pointer-events:none; z-index:1; overflow:hidden; }
        .floating-elements .bg-float {
            position: absolute; opacity: 0.5;
            animation: bgFloat 8s infinite ease-in-out;
        }
        @keyframes bgFloat {
            0% { transform: translateY(0px) rotate(0deg); opacity:0.5; }
            50% { transform: translateY(-20px) rotate(5deg); opacity:0.9; }
            100% { transform: translateY(0px) rotate(0deg); opacity:0.5; }
        }

        .surround-elements { position:absolute; inset:0; pointer-events:none; z-index:3; overflow:visible; }
        .surround-elements span {
            position: absolute; font-size: 22px;
            filter: drop-shadow(0 0 6px rgba(255,255,255,0.9));
            animation: floatSurround 4s infinite alternate ease-in-out;
        }
        @keyframes floatSurround {
            from { transform: translate(0,0) scale(1); }
            to { transform: translate(5px,-10px) scale(1.15); }
        }

        /* 日记界面 */
        .diary-screen { display:none; flex-direction:column; height:100vh; background:var(--bg-white); }
        .diary-screen.active { display:flex; }
        .gmail-header {
            height:64px; display:flex; align-items:center; padding:0 16px;
            border-bottom:1px solid var(--border-color); gap:12px; animation: liquidGlassBox 4s infinite ease-in-out;
        }
        .gmail-menu-btn {
            width:40px; height:40px; display:flex; align-items:center; justify-content:center;
            border-radius:50%; cursor:pointer; font-size:20px;
        }
        .gmail-logo { font-size:22px; display:flex; align-items:center; gap:8px; }
        .gmail-logo span { color:var(--google-blue); }
        .gmail-actions { margin-left:auto; display:flex; gap:12px; align-items:center; }
        .gmail-body { display:flex; flex:1; overflow:hidden; }
        .sidebar-left { width:240px; border-right:1px solid var(--border-color); display:flex; flex-direction:column; padding:8px 0; }
        .compose-btn {
            margin:8px 16px; background:var(--google-blue); color:white; border:none;
            border-radius:16px; padding:12px 24px; font-size:14px; cursor:pointer; display:flex; align-items:center; gap:8px;
        }
        .compose-btn:hover { background:var(--google-blue-hover); }
        .middle-list { width:360px; border-right:1px solid var(--border-color); overflow-y:auto; }
        .list-item { padding:14px 16px; border-bottom:1px solid var(--border-color); cursor:pointer; }
        .list-item.active { background:#e8f0fe; }
        .right-panel { flex:1; overflow-y:auto; display:flex; flex-direction:column; }
        .editor-container { display:none; flex-direction:column; height:100%; }
        .editor-header { padding:20px 24px 12px; border-bottom:1px solid var(--border-color); }
        .title-input { border:none; font-size:22px; width:100%; outline:none; background:transparent; }
        .editor-body { flex:1; padding:16px 24px; overflow-y:auto; }
        .content-editable { min-height:300px; outline:none; font-size:15px; line-height:1.6; }
        .content-editable img { max-width:100%; border-radius:8px; margin:8px 0; }
        .content-editable a { color:var(--google-blue); }
        .editor-footer {
            padding:12px 24px; border-top:1px solid var(--border-color);
            display:flex; justify-content:space-between; align-items:center;
        }
        .save-btn { background:var(--google-blue); color:white; border:none; padding:8px 24px; border-radius:4px; cursor:pointer; }
        .delete-btn { color:var(--google-red); background:none; border:1px solid var(--border-color); padding:8px 16px; border-radius:4px; cursor:pointer; }
        .file-upload-btn { background:none; border:1px solid var(--border-color); padding:8px 16px; border-radius:4px; cursor:pointer; }

        .modal-overlay {
            position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex;
            align-items:center; justify-content:center; z-index:100; opacity:0;
            pointer-events:none; transition: opacity 0.2s;
        }
        .modal-overlay.active { opacity:1; pointer-events:auto; }
        .modal-card { background:white; border-radius:8px; padding:40px 32px; width:400px; box-shadow:0 24px 38px rgba(0,0,0,0.2); }
        .modal-card h2 { font-size:24px; margin-bottom:24px; font-weight:400; }
        .input-field { width:100%; padding:12px; margin-bottom:16px; border:1px solid var(--border-color); border-radius:4px; font-size:14px; outline:none; }
        .modal-actions { display:flex; justify-content:flex-end; gap:12px; margin-top:24px; }
        .btn-cancel { background:none; border:none; color:var(--text-secondary); padding:10px 16px; cursor:pointer; font-weight:500; }
        .error-text { color:var(--google-red); font-size:13px; display:none; margin-bottom:12px; }
    </style>
</head>
<body>
    <div class="home-screen" id="homeScreen">
        <div class="top-bar">
            <div class="brand-link" id="enterDiaryBtn">乖宝和溪溪的快乐生活</div>
            <div class="top-right" id="homeTopRight"></div>
        </div>
        <div class="cover-wrapper" id="coverWrapper">
            <div class="floating-elements" id="floatingElements"></div>
            <div class="image-container" id="imageContainer">
                <div class="cover-placeholder" id="coverPlaceholder">📷</div>
            </div>
            <div class="surround-elements" id="surroundElements"></div>
        </div>
        <div style="text-align:center; padding: 8px;">
            <button class="save-cover-btn" id="saveCoverBtn">保存封面</button>
        </div>
    </div>

    <div class="diary-screen" id="diaryScreen">
        <div class="gmail-header">
            <div class="gmail-menu-btn" id="backHomeBtn">←</div>
            <div class="gmail-logo"><span>📒</span> 日记</div>
            <div class="gmail-actions" id="diaryTopRight"></div>
        </div>
        <div class="gmail-body">
            <div class="sidebar-left">
                <button class="compose-btn" id="newDiaryBtn" style="display:none;">✏️ 写日记</button>
                <div class="nav-item active">📋 所有日记</div>
            </div>
            <div class="middle-list" id="diaryList"><div style="padding:20px;text-align:center;color:var(--text-secondary);">暂无日记</div></div>
            <div class="right-panel" id="rightPanel">
                <div id="emptyState" style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--text-secondary);">选择一篇日记查看</div>
                <div class="editor-container" id="editorContainer" style="display:none;">
                    <div class="editor-header">
                        <input type="text" class="title-input" id="diaryTitle" placeholder="标题">
                    </div>
                    <div class="editor-body">
                        <div class="content-editable" id="diaryContent" contenteditable="true"></div>
                    </div>
                    <div class="editor-footer">
                        <div>
                            <button class="file-upload-btn" id="attachFileBtn" style="display:none;">📎 上传附件</button>
                            <button class="file-upload-btn" id="insertImageBtn" style="display:none;">🖼️ 插入图片</button>
                            <input type="file" id="imageInput" accept="image/*" style="display:none;">
                            <input type="file" id="fileInput" style="display:none;">
                        </div>
                        <div>
                            <button class="delete-btn" id="deleteDiaryBtn" style="display:none;">删除</button>
                            <button class="save-btn" id="saveDiaryBtn" style="display:none;">保存</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="loginModal">
        <div class="modal-card">
            <h2>管理员登录</h2>
            <input type="text" class="input-field" id="username" placeholder="用户名" autocomplete="off">
            <input type="password" class="input-field" id="password" placeholder="密码">
            <div class="error-text" id="loginError">用户名或密码错误</div>
            <div class="modal-actions">
                <button class="btn-cancel" id="cancelLogin">取消</button>
                <button class="btn-login" id="loginSubmit">登录</button>
            </div>
        </div>
    </div>

    <input type="file" id="coverFileInput" accept="image/*" style="display:none;">

    <script>
        (function() {
            const ADMIN = { user: 'XX', pass: 'YY' };
            const STORAGE = {
                diary: 'g_diary',
                auth: 'g_admin',
                coverDB: 'CoverDB',
                coverStore: 'covers',
                coverKey: 'main_cover',
                attachDB: 'AttachDB',
                attachStore: 'attachments'
            };

            const $ = id => document.getElementById(id);
            const homeScreen = $('homeScreen'), diaryScreen = $('diaryScreen'),
                homeTopRight = $('homeTopRight'), diaryTopRight = $('diaryTopRight'),
                enterDiaryBtn = $('enterDiaryBtn'), backHomeBtn = $('backHomeBtn'),
                diaryList = $('diaryList'), emptyState = $('emptyState'),
                editorContainer = $('editorContainer'), diaryTitle = $('diaryTitle'),
                diaryContent = $('diaryContent'), saveBtn = $('saveDiaryBtn'),
                deleteBtn = $('deleteDiaryBtn'), newBtn = $('newDiaryBtn'),
                insertImageBtn = $('insertImageBtn'), attachFileBtn = $('attachFileBtn'),
                imageInput = $('imageInput'), fileInput = $('fileInput'),
                coverFileInput = $('coverFileInput'), coverWrapper = $('coverWrapper'),
                coverPlaceholder = $('coverPlaceholder'), floatingEls = $('floatingElements'),
                imageContainer = $('imageContainer'), surroundEls = $('surroundElements'),
                saveCoverBtn = $('saveCoverBtn'),
                loginModal = $('loginModal'), uname = $('username'), pwd = $('password'),
                loginError = $('loginError'), loginSubmit = $('loginSubmit'), cancelLogin = $('cancelLogin');

            let entries = [], currentId = null, isAdmin = false;
            let coverDB = null, attachDB = null;
            let currentObjectURLs = [];
            let pendingCoverFile = null;

            // ========= IndexedDB =========
            function openDB(name, version, storeName) {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open(name, version);
                    req.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(storeName)) db.createObjectStore(storeName);
                    };
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            function idbPut(db, store, key, value) {
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(store, 'readwrite');
                    tx.objectStore(store).put(value, key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = (e) => reject(e.target.error);
                });
            }

            function idbGet(db, store, key) {
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(store, 'readonly');
                    const req = tx.objectStore(store).get(key);
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => reject(req.error);
                });
            }

            function idbDelete(db, store, key) {
                return new Promise((resolve, reject) => {
                    const tx = db.transaction(store, 'readwrite');
                    tx.objectStore(store).delete(key);
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            function revokeURLs() {
                currentObjectURLs.forEach(url => URL.revokeObjectURL(url));
                currentObjectURLs = [];
            }

            // 将 File/Blob 转换为 ArrayBuffer
            function readFileAsArrayBuffer(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = () => resolve(reader.result);
                    reader.onerror = reject;
                    reader.readAsArrayBuffer(file);
                });
            }

            // 封面加载（使用 ArrayBuffer 重建 Blob，兼容移动端）
            async function loadCoverDisplay() {
                revokeURLs();
                const oldImg = imageContainer.querySelector('.cover-img');
                if (oldImg) oldImg.remove();

                try {
                    const arrayBuffer = await idbGet(coverDB, STORAGE.coverStore, STORAGE.coverKey);
                    if (arrayBuffer) {
                        coverPlaceholder.style.display = 'none';
                        const blob = new Blob([arrayBuffer], { type: 'image/jpeg' }); // 类型可动态获取，这里先用通用
                        const url = URL.createObjectURL(blob);
                        currentObjectURLs.push(url);
                        const img = document.createElement('img');
                        img.className = 'cover-img';
                        img.alt = '封面';
                        img.onload = () => updateSurroundDecorations();
                        img.onerror = () => {
                            coverPlaceholder.style.display = 'block';
                            img.remove();
                        };
                        img.src = url;
                        imageContainer.appendChild(img);
                    } else {
                        coverPlaceholder.style.display = 'block';
                    }
                } catch (e) {
                    console.error('封面加载失败:', e);
                    coverPlaceholder.style.display = 'block';
                }
            }

            function previewCoverFile(file) {
                const oldImg = imageContainer.querySelector('.cover-img');
                if (oldImg) oldImg.remove();
                const url = URL.createObjectURL(file);
                currentObjectURLs.push(url);
                const img = document.createElement('img');
                img.className = 'cover-img';
                img.alt = '预览';
                img.onload = () => updateSurroundDecorations();
                img.src = url;
                imageContainer.appendChild(img);
                coverPlaceholder.style.display = 'none';
            }

            async function saveCoverToDB() {
                if (!pendingCoverFile) return;
                try {
                    const arrayBuffer = await readFileAsArrayBuffer(pendingCoverFile);
                    await idbPut(coverDB, STORAGE.coverStore, STORAGE.coverKey, arrayBuffer);
                    pendingCoverFile = null;
                    saveCoverBtn.classList.remove('show');
                    await loadCoverDisplay();
                    alert('封面已保存！');
                } catch (e) {
                    alert('封面保存失败：' + e.message);
                }
            }

            function createFloatingBg() {
                floatingEls.innerHTML = '';
                const emojis = ['🌸', '✨', '🪶', '💮', '🌺', '⭐', '❀', '✿'];
                for (let i = 0; i < 24; i++) {
                    const span = document.createElement('span');
                    span.className = 'bg-float';
                    span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                    span.style.left = Math.random()*100 + '%';
                    span.style.top = Math.random()*100 + '%';
                    span.style.fontSize = (20 + Math.random()*24) + 'px';
                    span.style.animationDelay = Math.random()*5 + 's';
                    span.style.animationDuration = (6 + Math.random()*8) + 's';
                    floatingEls.appendChild(span);
                }
            }

            function updateSurroundDecorations() {
                surroundEls.innerHTML = '';
                const imgEl = imageContainer.querySelector('.cover-img');
                if (!imgEl || imgEl.naturalWidth === 0) return;
                const wrapperRect = coverWrapper.getBoundingClientRect();
                const imgRect = imgEl.getBoundingClientRect();
                const imgLeft = imgRect.left - wrapperRect.left;
                const imgTop = imgRect.top - wrapperRect.top;
                const imgWidth = imgRect.width;
                const imgHeight = imgRect.height;

                const decorations = ['🌸', '✨', '💮', '🌺', '⭐', '🪶', '💖', '🎀'];
                const positions = [
                    { x: imgLeft - 18, y: imgTop - 18 },
                    { x: imgLeft + imgWidth/2 - 20, y: imgTop - 22 },
                    { x: imgLeft + imgWidth - 15, y: imgTop - 15 },
                    { x: imgLeft + imgWidth - 5, y: imgTop + imgHeight/2 - 20 },
                    { x: imgLeft + imgWidth - 20, y: imgTop + imgHeight - 15 },
                    { x: imgLeft + imgWidth/2 - 25, y: imgTop + imgHeight - 5 },
                    { x: imgLeft - 18, y: imgTop + imgHeight - 18 },
                    { x: imgLeft - 22, y: imgTop + imgHeight/2 - 20 },
                    { x: imgLeft - 8, y: imgTop + 24 },
                    { x: imgLeft + imgWidth - 24, y: imgTop + 24 },
                    { x: imgLeft + 24, y: imgTop - 24 },
                    { x: imgLeft + imgWidth - 32, y: imgTop + imgHeight - 20 },
                ];
                positions.forEach((pos, i) => {
                    const span = document.createElement('span');
                    span.textContent = decorations[i % decorations.length];
                    span.style.left = pos.x + 'px';
                    span.style.top = pos.y + 'px';
                    span.style.animationDelay = (Math.random() * 1.5) + 's';
                    surroundEls.appendChild(span);
                });
            }

            window.addEventListener('resize', () => {
                if (!homeScreen.classList.contains('hidden')) updateSurroundDecorations();
            });

            // 日记功能（不变）
            function loadEntries() { entries = JSON.parse(localStorage.getItem(STORAGE.diary) || '[]'); }
            function saveEntries() { localStorage.setItem(STORAGE.diary, JSON.stringify(entries)); }

            function renderList() {
                if (!entries.length) {
                    diaryList.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text-secondary);">暂无日记</div>';
                    return;
                }
                const sorted = [...entries].sort((a,b) => b.date - a.date);
                diaryList.innerHTML = sorted.map(e => `
                    <div class="list-item${e.id===currentId?' active':''}" data-id="${e.id}">
                        <div style="font-size:12px;color:var(--text-secondary);">${new Date(e.date).toLocaleDateString()}</div>
                        <div style="font-weight:500;">${escapeHtml(e.title||'无标题')}</div>
                    </div>`).join('');
            }

            function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

            async function saveAttachment(diaryId, blob, fileName) {
                const id = `att_${diaryId}_${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
                await idbPut(attachDB, STORAGE.attachStore, id, { blob, fileName, diaryId });
                return id;
            }

            async function getAttachment(id) {
                return await idbGet(attachDB, STORAGE.attachStore, id);
            }

            async function deleteAttachmentsByDiary(diaryId) {
                return new Promise((resolve, reject) => {
                    const tx = attachDB.transaction(STORAGE.attachStore, 'readwrite');
                    const store = tx.objectStore(STORAGE.attachStore);
                    const allReq = store.getAllKeys();
                    allReq.onsuccess = () => {
                        const keys = allReq.result.filter(k => k.startsWith(`att_${diaryId}_`));
                        keys.forEach(k => store.delete(k));
                    };
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            }

            function serializeContent() {
                const div = document.createElement('div');
                div.innerHTML = diaryContent.innerHTML;
                div.querySelectorAll('[data-attachment-id]').forEach(el => {
                    const id = el.getAttribute('data-attachment-id');
                    if (el.tagName === 'IMG') {
                        const placeholder = document.createElement('span');
                        placeholder.setAttribute('data-attachment-id', id);
                        placeholder.setAttribute('data-type', 'image');
                        el.replaceWith(placeholder);
                    } else if (el.tagName === 'A') {
                        const placeholder = document.createElement('span');
                        placeholder.setAttribute('data-attachment-id', id);
                        placeholder.setAttribute('data-type', 'file');
                        placeholder.textContent = el.textContent;
                        el.replaceWith(placeholder);
                    }
                });
                return div.innerHTML;
            }

            async function deserializeContent(html) {
                const div = document.createElement('div');
                div.innerHTML = html;
                const placeholders = div.querySelectorAll('[data-attachment-id]');
                for (const el of placeholders) {
                    const id = el.getAttribute('data-attachment-id');
                    const type = el.getAttribute('data-type');
                    try {
                        const data = await getAttachment(id);
                        if (data && data.blob) {
                            const url = URL.createObjectURL(data.blob);
                            currentObjectURLs.push(url);
                            if (type === 'image') {
                                const img = document.createElement('img');
                                img.src = url;
                                img.setAttribute('data-attachment-id', id);
                                el.replaceWith(img);
                            } else {
                                const a = document.createElement('a');
                                a.href = url;
                                a.download = data.fileName;
                                a.textContent = el.textContent || data.fileName;
                                a.setAttribute('data-attachment-id', id);
                                a.addEventListener('click', (e) => {
                                    e.preventDefault();
                                    const downloadUrl = URL.createObjectURL(data.blob);
                                    const tempA = document.createElement('a');
                                    tempA.href = downloadUrl;
                                    tempA.download = data.fileName;
                                    tempA.click();
                                    URL.revokeObjectURL(downloadUrl);
                                });
                                el.replaceWith(a);
                            }
                        }
                    } catch (e) {
                        el.replaceWith(document.createTextNode('[附件丢失]'));
                    }
                }
                return div.innerHTML;
            }

            async function loadEditor(id) {
                revokeURLs();
                const entry = entries.find(e => e.id === id);
                if (!entry) { clearEditor(); return; }
                currentId = id;
                diaryTitle.value = entry.title || '';
                diaryContent.innerHTML = await deserializeContent(entry.content || '');
                editorContainer.style.display = 'flex';
                emptyState.style.display = 'none';
                deleteBtn.style.display = isAdmin ? 'inline-block' : 'none';
            }

            function clearEditor() {
                currentId = null;
                diaryTitle.value = '';
                diaryContent.innerHTML = '';
                editorContainer.style.display = 'none';
                emptyState.style.display = 'flex';
                deleteBtn.style.display = 'none';
                revokeURLs();
            }

            async function saveCurrentDiary() {
                if (!isAdmin) return alert('请先登录');
                const title = diaryTitle.value.trim();
                const htmlContent = serializeContent();
                if (!title && !htmlContent) return alert('标题和内容不能都为空');
                const now = Date.now();
                if (currentId) {
                    const entry = entries.find(e => e.id === currentId);
                    if (entry) { entry.title = title; entry.content = htmlContent; entry.date = now; }
                } else {
                    currentId = now;
                    entries.push({ id: now, date: now, title, content: htmlContent });
                }
                saveEntries();
                renderList();
                await loadEditor(currentId);
                alert('保存成功');
            }

            async function deleteCurrentDiary() {
                if (!isAdmin || !currentId) return;
                if (!confirm('确定删除？')) return;
                await deleteAttachmentsByDiary(currentId);
                entries = entries.filter(e => e.id !== currentId);
                saveEntries();
                clearEditor();
                renderList();
            }

            async function insertImageFile(file) {
                if (!isAdmin) return;
                const diaryId = currentId || 0;
                const id = await saveAttachment(diaryId, file, file.name);
                const url = URL.createObjectURL(file);
                currentObjectURLs.push(url);
                const img = document.createElement('img');
                img.src = url;
                img.setAttribute('data-attachment-id', id);
                diaryContent.focus();
                document.execCommand('insertHTML', false, img.outerHTML);
            }

            async function insertFileLink(file) {
                if (!isAdmin) return;
                const diaryId = currentId || 0;
                const id = await saveAttachment(diaryId, file, file.name);
                const a = document.createElement('a');
                a.textContent = file.name;
                a.setAttribute('data-attachment-id', id);
                a.style.cursor = 'pointer';
                a.addEventListener('click', async (e) => {
                    e.preventDefault();
                    const data = await getAttachment(id);
                    if (data && data.blob) {
                        const url = URL.createObjectURL(data.blob);
                        const tempA = document.createElement('a');
                        tempA.href = url;
                        tempA.download = data.fileName;
                        tempA.click();
                        URL.revokeObjectURL(url);
                    }
                });
                diaryContent.focus();
                document.execCommand('insertHTML', false, a.outerHTML);
            }

            // 登录与UI
            function checkAuth() { isAdmin = localStorage.getItem(STORAGE.auth) === 'true'; }
            function setAuth(v) {
                if (v) localStorage.setItem(STORAGE.auth, 'true');
                else localStorage.removeItem(STORAGE.auth);
                isAdmin = v;
                updateUI();
            }

            function updateUI() {
                homeTopRight.innerHTML = '';
                if (isAdmin) {
                    const changeBtn = document.createElement('button');
                    changeBtn.className = 'cover-change-btn visible';
                    changeBtn.textContent = '🖼️ 更换封面';
                    changeBtn.onclick = () => coverFileInput.click();
                    homeTopRight.appendChild(changeBtn);
                    const logoutBtn = document.createElement('button');
                    logoutBtn.className = 'btn-logout';
                    logoutBtn.textContent = '退出';
                    logoutBtn.onclick = () => setAuth(false);
                    homeTopRight.appendChild(logoutBtn);
                } else {
                    const loginBtn = document.createElement('button');
                    loginBtn.className = 'btn-login';
                    loginBtn.textContent = '登录';
                    loginBtn.onclick = showLogin;
                    homeTopRight.appendChild(loginBtn);
                }

                diaryTopRight.innerHTML = '';
                if (isAdmin) {
                    const logoutBtn = document.createElement('button');
                    logoutBtn.className = 'btn-logout';
                    logoutBtn.textContent = '退出';
                    logoutBtn.onclick = () => {
                        setAuth(false);
                        diaryScreen.classList.remove('active');
                        homeScreen.classList.remove('hidden');
                    };
                    diaryTopRight.appendChild(logoutBtn);
                }

                newBtn.style.display = isAdmin ? 'flex' : 'none';
                saveBtn.style.display = isAdmin ? 'inline-block' : 'none';
                insertImageBtn.style.display = isAdmin ? 'inline-block' : 'none';
                attachFileBtn.style.display = isAdmin ? 'inline-block' : 'none';
                diaryTitle.readOnly = !isAdmin;
                diaryContent.contentEditable = isAdmin ? 'true' : 'false';
            }

            function showLogin() { loginModal.classList.add('active'); uname.focus(); }
            function hideLogin() { loginModal.classList.remove('active'); }
            loginSubmit.onclick = () => {
                if (uname.value === ADMIN.user && pwd.value === ADMIN.pass) {
                    setAuth(true);
                    hideLogin();
                    if (!diaryScreen.classList.contains('active')) enterDiary();
                } else { loginError.style.display = 'block'; pwd.value = ''; }
            };
            cancelLogin.onclick = hideLogin;
            function enterDiary() {
                if (!isAdmin) { showLogin(); return; }
                homeScreen.classList.add('hidden');
                diaryScreen.classList.add('active');
                renderList();
                if (entries.length) loadEditor(entries.sort((a,b)=>b.date-a.date)[0].id);
                else clearEditor();
            }

            enterDiaryBtn.onclick = enterDiary;
            backHomeBtn.onclick = () => {
                diaryScreen.classList.remove('active');
                homeScreen.classList.remove('hidden');
                updateSurroundDecorations();
            };

            coverFileInput.addEventListener('change', () => {
                const file = coverFileInput.files[0];
                if (!file) return;
                if (file.size > 10*1024*1024) { alert('图片不超过10MB'); return; }
                pendingCoverFile = file;
                previewCoverFile(file);
                saveCoverBtn.classList.add('show');
                coverFileInput.value = '';
            });
            saveCoverBtn.addEventListener('click', saveCoverToDB);

            diaryList.addEventListener('click', e => {
                const item = e.target.closest('.list-item');
                if (item) loadEditor(Number(item.dataset.id));
            });
            newBtn.onclick = () => {
                revokeURLs();
                currentId = null;
                diaryTitle.value = '';
                diaryContent.innerHTML = '';
                editorContainer.style.display = 'flex';
                emptyState.style.display = 'none';
                deleteBtn.style.display = 'none';
                diaryTitle.focus();
            };
            saveBtn.onclick = saveCurrentDiary;
            deleteBtn.onclick = deleteCurrentDiary;
            insertImageBtn.onclick = () => imageInput.click();
            imageInput.addEventListener('change', () => {
                const file = imageInput.files[0];
                if (file) insertImageFile(file);
                imageInput.value = '';
            });
            attachFileBtn.onclick = () => fileInput.click();
            fileInput.addEventListener('change', () => {
                const file = fileInput.files[0];
                if (file) insertFileLink(file);
                fileInput.value = '';
            });
            diaryContent.addEventListener('paste', (e) => {
                if (!isAdmin) return;
                const items = e.clipboardData.items;
                for (let item of items) {
                    if (item.type.startsWith('image/')) {
                        e.preventDefault();
                        const blob = item.getAsFile();
                        insertImageFile(blob);
                        break;
                    }
                }
            });
            document.addEventListener('keydown', (e) => {
                if ((e.ctrlKey || e.metaKey) && e.key === 's') {
                    e.preventDefault();
                    if (diaryScreen.classList.contains('active') && isAdmin) saveCurrentDiary();
                }
            });

            async function init() {
                try {
                    coverDB = await openDB(STORAGE.coverDB, 1, STORAGE.coverStore);
                    attachDB = await openDB(STORAGE.attachDB, 1, STORAGE.attachStore);
                } catch (e) {
                    alert('浏览器不支持本地存储，部分功能可能无法使用。');
                }
                await loadCoverDisplay();
                createFloatingBg();
                updateSurroundDecorations();
                checkAuth();
                loadEntries();
                updateUI();
                homeScreen.classList.remove('hidden');
                diaryScreen.classList.remove('active');
            }
            init();
        })();
    </script>
</body>
</html>
